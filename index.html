<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>嘉新的探索地圖</title>
    <meta name="description" content="從穩固的城市基石，到細膩的人本守護。自 1954 年築起第一道堅韌牆面起，嘉新不斷跨越產業邊界，建立多元職涯探索地圖。">
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700&display=swap" rel="stylesheet">

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website">
    <meta property="og:title" content="嘉新的探索地圖">
    <meta property="og:description" content="從穩固的城市基石，到細膩的人本守護。自 1954 年築起第一道堅韌牆面起，嘉新不斷跨越產業邊界，建立多元職涯探索地圖。">
    <meta property="og:image" content="assets/預覽圖.png">

    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image">
    <meta property="twitter:title" content="嘉新的探索地圖">
    <meta property="twitter:description" content="從穩固的城市基石，到細膩的人本守護。自 1954 年築起第一道堅韌牆面起，嘉新不斷跨越產業邊界，建立多元職涯探索地圖。">
    <meta property="twitter:image" content="assets/預覽圖.png">

    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-363E7F2VPB"></script>
    <script>
        window.dataLayer = window.dataLayer || [];
        function gtag() { dataLayer.push(arguments); }
        gtag('js', new Date());

        gtag('config', 'G-363E7F2VPB');
    </script>
</head>

<body>
    <div id="app">
        <!-- Intro Overlay -->
        <div id="intro-overlay" class="intro-overlay">
            <div class="intro-content">
                <h1 class="intro-title">從穩固的城市基石，到細膩的人本守護。</h1>
                <p class="intro-subtitle">自 1954 年築起第一道堅韌牆面起，嘉新不斷跨越產業邊界。<br>
                    我們將水泥的嚴謹轉化為旅宿的精緻，將建築的安定延伸至健康照護的專業。</p>
                <p class="intro-conclusion">在多元事業的拼圖中，我們持續定義 Quality of Life 的真實模樣——<br>為人們築起一個健康且永續發展的未來。</p>
                <button class="intro-enter-btn" onclick="closeIntro()">進入地圖探索 ▶</button>
            </div>
        </div>

        <!-- Map View -->
        <div id="map-view" class="view active">
            <div class="map-container">
                <div class="base-map">
                    <!-- New Base Map Background -->
                    <img src="assets/base_map_landscape.png" class="map-bg" alt="Career Map Landscape">

                    <div class="building-entity" style="top: 45%; left: 17%; width: 27%;"
                        onclick="navigateTo('culture')">
                        <img src="assets/v2_b1_t.png" alt="企業大樓" class="blended-img" />
                        <div class="label-tag" style="margin-top: -10px;">🏢 企業故事長廊</div>
                    </div>

                    <div class="building-entity" style="top: 20%; left: 14%; width: 22%;" onclick="navigateTo('quiz')">
                        <img src="assets/v2_b2_t.png" alt="咖啡廳" class="blended-img" />
                        <div class="label-tag" style="margin-top: -10px;">☕ 職缺測驗咖啡廳</div>
                    </div>

                    <div class="building-entity" style="top: 15%; left: 39.5%; width: 22%;"
                        onclick="navigateTo('story')">
                        <img src="assets/v2_b3_t.png" alt="展演場所" class="blended-img" />
                        <div class="label-tag" style="margin-top: -15px;">🎪 嘉人視角專區</div>
                    </div>

                    <div class="building-entity" style="top: 21%; left: 66%; width: 25%;" onclick="navigateTo('units')">
                        <img src="assets/v2_b4_t.png" alt="永續方舟" class="blended-img" />
                        <div class="label-tag" style="margin-top: -45px;margin-left: -65px">🚢 嘉新永續方舟</div>
                    </div>

                    <div class="building-entity" style="top: 68%; left: 45%; width: 32%;"
                        onclick="navigateTo('benefits')">
                        <img src="assets/v2_b5_t.png" alt="溫馨住家" class="blended-img" />
                        <div class="label-tag" style="margin-top: -100px;">🏡 社群傳送門 </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Content Views -->
        <div id="content-view" class="view hidden">
            <header class="content-header">
                <button class="back-btn" onclick="navigateTo('map')">← 返回地圖</button>
                <h1 id="content-title">功能名稱</h1>
            </header>
            <main id="content-body" class="content-body">
                <!-- Content injected via JS -->
            </main>
        </div>
    </div>

    <script src="quizData.js"></script>
    <script src="app.js"></script>
</body>

</html>
